<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<meta http-equiv="Content-Type" content="text/html" />
	<title>Live Simulator: 2 Icon Creator</title>
	<link rel="stylesheet" href="../semantic/semantic.min.css" />
	<link rel="stylesheet" href="../index.css" />
	<script src="../jquery-3.5.1.min.js"></script>
	<script src="../semantic/semantic.min.js"></script>
	<style>
		/* Layout and editor aesthetics */
		.editor-container {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 1rem;
		}

		#editorCanvas {
			border: 2px dashed #a333c8;
			/* Semantic UI violet */
			background-color: #fafafa;
			cursor: pointer;
			max-width: 100%;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
			border-radius: 4px;
			transition: border-color 0.2s ease;
		}

		#editorCanvas.image-loaded {
			border-style: solid;
			border-color: #2185d0;
			/* Semantic UI blue */
			cursor: move;
		}

		/* Checkerboard background for final transparent image */
		.checkerboard-preview {
			background-image:
				linear-gradient(45deg, #ddd 25%, transparent 25%),
				linear-gradient(-45deg, #ddd 25%, transparent 25%),
				linear-gradient(45deg, transparent 75%, #ddd 75%),
				linear-gradient(-45deg, transparent 75%, #ddd 75%);
			background-size: 16px 16px;
			background-position: 0 0, 0 8px, 8px -8px, -8px 0;
			background-color: #fff;
			width: 128px;
			height: 128px;
			border: 2px solid #767676;
			border-radius: 4px;
			display: inline-block;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
		}

		.color-palette-container {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			margin-top: 8px;
		}

		.color-chip {
			width: 24px;
			height: 24px;
			border-radius: 50%;
			border: 2px solid #fff;
			box-shadow: 0 0 0 1px #b5b5b5;
			cursor: pointer;
			transition: transform 0.1s ease;
		}

		.color-chip:hover {
			transform: scale(1.15);
		}

		.color-chip.active {
			box-shadow: 0 0 0 2px #2185d0;
		}

		.field-group {
			border: 1px solid rgba(34, 36, 38, .15);
			padding: 1em;
			border-radius: 4px;
			margin-bottom: 1em;
			background: #fbfbfb;
		}

		.field-group-title {
			font-weight: bold;
			margin-bottom: 0.5em;
			color: rgba(0, 0, 0, .85);
		}
	</style>
</head>

<body>
	<div class="ui active dimmer" id="loader">
		<div class="ui text loader">Loading frame assets...</div>
	</div>

	<div class="ui violet segment">
		<h1 class="ui header"><i class="life ring outline icon"></i>Icon Creator</h1>

		<div class="ui stackable two column grid">
			<!-- Left Column: Canvas Viewport & Zoom Controls -->
			<div class="column">
				<div class="editor-container">
					<canvas id="editorCanvas" width="300" height="300"
						title="Drag and drop your image here, or click to browse"></canvas>

					<div style="width: 100%; max-width: 300px; margin-top: 1.5em;">
						<div class="ui form">
							<div class="field">
								<label><i class="search plus icon"></i> Zoom</label>
								<input type="range" id="zoomSlider" min="0.1" max="5.0" step="0.01" value="1.0" disabled
									style="width: 100%; cursor: pointer;">
							</div>
						</div>

						<div style="display: flex; justify-content: space-between; margin-top: 1em;">
							<button class="ui tiny button disabled" id="resetBtn"><i class="undo icon"></i> Reset
								View</button>
							<button class="ui tiny primary button" id="uploadBtn"><i class="upload icon"></i> Choose
								Image</button>
							<input type="file" id="imageInput" accept="image/*" style="display: none;">
						</div>
					</div>
				</div>
			</div>

			<!-- Right Column: Settings Panel -->
			<div class="column">
				<div class="ui form">
					<!-- Frame Selection Group -->
					<div class="field-group">
						<div class="field-group-title">1. Frame Selection</div>
						<div class="grouped fields">
							<div class="field">
								<div class="ui radio checkbox">
									<input type="radio" name="frameSelect" value="sr" checked="checked">
									<label>SR</label>
								</div>
							</div>
							<div class="field">
								<div class="ui radio checkbox">
									<input type="radio" name="frameSelect" value="ur_empty">
									<label>UR</label>
								</div>
							</div>
							<div class="field">
								<div class="ui radio checkbox">
									<input type="radio" name="frameSelect" value="ur_old">
									<label>UR (Old)</label>
								</div>
							</div>
						</div>

						<div class="field" style="margin-top: 1em;">
							<label>Frame Tint Color</label>
							<div style="display: flex; align-items: center; gap: 10px;">
								<input type="color" id="frameColor" value="#ffc600"
									style="padding: 0; width: 40px; height: 30px; border: 1px solid #ccc; cursor: pointer;">
								<span id="frameHexLabel" style="font-family: monospace;">#ffc600</span>
							</div>
							<div class="color-palette-container" id="frameQuickPalette"></div>
						</div>
					</div>

					<!-- Background Selection Group -->
					<div class="field-group">
						<div class="field-group-title">2. Background Selection</div>
						<div class="inline fields">
							<div class="field">
								<div class="ui radio checkbox">
									<input type="radio" name="bgSelect" value="none" checked="checked">
									<label>None</label>
								</div>
							</div>
							<div class="field">
								<div class="ui radio checkbox">
									<input type="radio" name="bgSelect" value="smile">
									<label>Background</label>
								</div>
							</div>
						</div>

						<div class="field disabled" id="bgColorContainer" style="margin-top: 1em;">
							<label>Background Tint Color</label>
							<div style="display: flex; align-items: center; gap: 10px;">
								<input type="color" id="bgColor" value="#ff4b72"
									style="padding: 0; width: 40px; height: 30px; border: 1px solid #ccc; cursor: pointer;">
								<span id="bgHexLabel" style="font-family: monospace;">#ff4b72</span>
							</div>
							<div class="color-palette-container" id="bgQuickPalette"></div>
						</div>
					</div>

					<!-- Generate Action -->
					<button class="ui violet fluid large button disabled" id="generateBtn"><i class="cogs icon"></i>
						Generate Icon</button>
				</div>
			</div>
		</div>

		<!-- Bottom Area: Result Presentation -->
		<div class="ui segment" id="resultSegment" style="display: none; margin-top: 2em; text-align: center;">
			<h3 class="ui header">Generated Icon</h3>
			<div style="margin: 1.5em 0;">
				<div class="checkerboard-preview">
					<img id="resultPreview" src="" alt="Generated Icon" style="width: 100%; height: 100%;">
				</div>
			</div>
			<p>Your icon has been generated in 128x128 pixels. Click the button below to download it.</p>
			<a class="ui positive button" id="downloadLink" href="" download="icon.png"><i class="download icon"></i>
				Download PNG</a>
		</div>
	</div>

	<script type="module">
		// Configurable quick color palette
		const QUICK_PALETTE = [
			{ hex: '#ffc600', name: 'Gold' },
			{ hex: '#ff4b72', name: 'Pink' },
			{ hex: '#8a2be2', name: 'Purple' },
			{ hex: '#0070f3', name: 'Blue' },
			{ hex: '#00e5ff', name: 'Cyan' },
			{ hex: '#2ecc71', name: 'Green' },
			{ hex: '#ff7f50', name: 'Orange' },
			{ hex: '#e74c3c', name: 'Red' },
			{ hex: '#ffffff', name: 'White' },
			{ hex: '#000000', name: 'Black' }
		];

		const ASSET_PATHS = {
			mask: 'liveicontemp/mask.png',
			frame_sr: 'liveicontemp/star4circleSR_Custom.png',
			frame_ur_old: 'liveicontemp/star4circleURCustom_Old.png',
			frame_ur_empty: 'liveicontemp/star4circleUREmpty.png',
			bg_smile: 'liveicontemp/star4foreURSmile_empty.png'
		};

		const images = {};
		const canvas = document.getElementById('editorCanvas');

		// User editing state
		let userImg = null;
		let userImgLoaded = false;
		let userScale = 1.0;
		let defaultScale = 1.0;
		let userX = 0;
		let userY = 0;

		// Drag and zoom interaction states
		let isDragging = false;
		let lastMouseX = 0;
		let lastMouseY = 0;

		// Cached canvases for optimized dragging
		let frameCache = null;
		let bgCache = null;
		let maskOverlayCache = null;

		// Preload static assets
		function preloadAssets() {
			let loadedCount = 0;
			const entries = Object.entries(ASSET_PATHS);
			const totalCount = entries.length;

			entries.forEach(([name, url]) => {
				const img = new Image();
				img.onload = () => {
					images[name] = img;
					loadedCount++;
					if (loadedCount === totalCount) {
						onAssetsLoaded();
					}
				};
				img.onerror = () => {
					console.error('Failed to load asset: ' + url);
					loadedCount++;
					if (loadedCount === totalCount) {
						onAssetsLoaded();
					}
				};
				img.src = url;
			});
		}

		// Initialisation after preloading
		function onAssetsLoaded() {
			$('#loader').removeClass('active');

			// Build caches
			initMaskOverlayCache();
			updateFrameCache();
			updateBgCache();

			// Initialize palette chips
			renderQuickPalettes();

			// Draw initial state
			redrawEditor();
		}

		// Tint function using piecewise linear interpolation:
		// V < 0.5: color = Tint * (2 * V)
		// V >= 0.5: color = Tint + (White - Tint) * (2 * V - 1)
		/**
		 * Tints a grayscale image/canvas with the specified color using piecewise linear interpolation.
		 * @param {HTMLImageElement|HTMLCanvasElement} imgEl - The source image or canvas element.
		 * @param {string} tintColorHex - The tint color in hex format (e.g. "#ff0000").
		 * @returns {HTMLCanvasElement} The tinted canvas.
		 */
		function tintImage(imgEl, tintColorHex) {
			const tempCanvas = document.createElement('canvas');
			tempCanvas.width = imgEl.naturalWidth || imgEl.width;
			tempCanvas.height = imgEl.naturalHeight || imgEl.height;
			const tempCtx = tempCanvas.getContext('2d');
			tempCtx.drawImage(imgEl, 0, 0);

			const rTint = parseInt(tintColorHex.substring(1, 3), 16);
			const gTint = parseInt(tintColorHex.substring(3, 5), 16);
			const bTint = parseInt(tintColorHex.substring(5, 7), 16);

			const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
			const data = imgData.data;

			for (let i = 0; i < data.length; i += 4) {
				const r = data[i];
				const a = data[i + 3];

				if (a === 0) continue;

				// Grayscale intensity (use Red channel)
				const v = r / 255.0;
				let newR, newG, newB;

				if (v < 0.5) {
					const factor = 2.0 * v;
					newR = rTint * factor;
					newG = gTint * factor;
					newB = bTint * factor;
				} else {
					const factor = 2.0 * v - 1.0;
					newR = rTint + (255 - rTint) * factor;
					newG = gTint + (255 - gTint) * factor;
					newB = bTint + (255 - bTint) * factor;
				}

				data[i] = Math.min(255, Math.max(0, Math.round(newR)));
				data[i + 1] = Math.min(255, Math.max(0, Math.round(newG)));
				data[i + 2] = Math.min(255, Math.max(0, Math.round(newB)));
			}

			tempCtx.putImageData(imgData, 0, 0);
			return tempCanvas;
		}

		// Pre-compute mask overlay cache (cuts out the mask shape from 60% black)
		function initMaskOverlayCache() {
			if (!images['mask']) return;
			maskOverlayCache = document.createElement('canvas');
			maskOverlayCache.width = canvas.width;
			maskOverlayCache.height = canvas.height;
			const oCtx = maskOverlayCache.getContext('2d');

			// Fill overlay with semi-transparent black
			oCtx.fillStyle = 'rgba(0, 0, 0, 0.6)';
			oCtx.fillRect(0, 0, maskOverlayCache.width, maskOverlayCache.height);

			// Remove the mask area using the grayscale intensity
			const maskTempCanvas = document.createElement('canvas');
			maskTempCanvas.width = canvas.width;
			maskTempCanvas.height = canvas.height;
			const mtCtx = maskTempCanvas.getContext('2d');
			mtCtx.drawImage(images['mask'], 0, 0, canvas.width, canvas.height);

			const maskData = mtCtx.getImageData(0, 0, canvas.width, canvas.height);
			const overlayData = oCtx.getImageData(0, 0, canvas.width, canvas.height);

			const m = maskData.data;
			const o = overlayData.data;

			for (let i = 0; i < o.length; i += 4) {
				const intensity = m[i] / 255.0;
				const maskAlpha = m[i + 3] / 255.0;
				// Output alpha of overlay is reduced by the mask's intensity
				o[i + 3] = Math.round(o[i + 3] * (1.0 - intensity * maskAlpha));
			}

			oCtx.putImageData(overlayData, 0, 0);
		}

		function updateFrameCache() {
			const frameVal = $('input[name="frameSelect"]:checked').val();
			let frameImg = null;
			if (frameVal === 'sr') frameImg = images['frame_sr'];
			else if (frameVal === 'ur_old') frameImg = images['frame_ur_old'];
			else if (frameVal === 'ur_empty') frameImg = images['frame_ur_empty'];

			if (frameImg) {
				const frameColor = $('#frameColor').val();
				frameCache = tintImage(frameImg, frameColor);
			} else {
				frameCache = null;
			}
		}

		function updateBgCache() {
			const bgVal = $('input[name="bgSelect"]:checked').val();
			if (bgVal === 'smile' && images['bg_smile']) {
				const bgColor = $('#bgColor').val();
				bgCache = tintImage(images['bg_smile'], bgColor);
			} else {
				bgCache = null;
			}
		}

		function renderQuickPalettes() {
			const framePalette = $('#frameQuickPalette');
			const bgPalette = $('#bgQuickPalette');

			framePalette.empty();
			bgPalette.empty();

			QUICK_PALETTE.forEach(item => {
				// Frame color chip
				const frameChip = $('<div class="color-chip"></div>')
					.css('background-color', item.hex)
					.attr('title', item.name)
					.attr('data-color', item.hex)
					.addClass('frame-chip')
					.on('click', function () {
						$('#frameColor').val(item.hex);
						$('#frameHexLabel').text(item.hex);
						$('.frame-chip').removeClass('active');
						$(this).addClass('active');
						updateFrameCache();
						redrawEditor();
					});
				if ($('#frameColor').val().toLowerCase() === item.hex.toLowerCase()) {
					frameChip.addClass('active');
				}
				framePalette.append(frameChip);

				// Background color chip
				const bgChip = $('<div class="color-chip"></div>')
					.css('background-color', item.hex)
					.attr('title', item.name)
					.attr('data-color', item.hex)
					.addClass('bg-chip')
					.on('click', function () {
						$('#bgColor').val(item.hex);
						$('#bgHexLabel').text(item.hex);
						$('.bg-chip').removeClass('active');
						$(this).addClass('active');
						updateBgCache();
						redrawEditor();
					});
				if ($('#bgColor').val().toLowerCase() === item.hex.toLowerCase()) {
					bgChip.addClass('active');
				}
				bgPalette.append(bgChip);
			});
		}

		function drawPlaceholder() {
			const ctx = canvas.getContext('2d');
			ctx.clearRect(0, 0, canvas.width, canvas.height);

			ctx.fillStyle = '#fafafa';
			ctx.fillRect(0, 0, canvas.width, canvas.height);

			ctx.fillStyle = '#a333c8';
			ctx.font = 'bold 14px sans-serif';
			ctx.textAlign = 'center';
			ctx.textBaseline = 'middle';
			ctx.fillText('Drag & Drop Image Here', canvas.width / 2, canvas.height / 2 - 12);
			ctx.fillStyle = '#767676';
			ctx.font = '12px sans-serif';
			ctx.fillText('or click "Choose Image"', canvas.width / 2, canvas.height / 2 + 12);
		}

		// Recursively downscale the image by steps of 50% until target size is reached to prevent aliasing
		/**
		 * Recursively downscales the image using steps of 50% max to prevent aliasing.
		 * @param {HTMLImageElement|HTMLCanvasElement} imgEl - The source image or canvas.
		 * @param {number} targetW - The target width.
		 * @param {number} targetH - The target height.
		 * @returns {HTMLImageElement|HTMLCanvasElement} The downscaled canvas or original image/canvas.
		 */
		function getSmoothImage(imgEl, targetW, targetH) {
			let currentW = imgEl.naturalWidth || imgEl.width;
			let currentH = imgEl.naturalHeight || imgEl.height;

			if (currentW <= 0 || currentH <= 0 || targetW <= 0 || targetH <= 0) {
				return imgEl;
			}

			// If the target is not smaller, return the original
			if (targetW >= currentW || targetH >= currentH) {
				return imgEl;
			}

			let currentCanvas = imgEl;

			// Step down by a factor of 0.5 until next step would go below target dimensions
			while (currentW * 0.5 >= targetW && currentH * 0.5 >= targetH) {
				const nextW = Math.round(currentW * 0.5);
				const nextH = Math.round(currentH * 0.5);

				const nextCanvas = document.createElement('canvas');
				nextCanvas.width = nextW;
				nextCanvas.height = nextH;
				const nextCtx = nextCanvas.getContext('2d');

				nextCtx.drawImage(currentCanvas, 0, 0, currentW, currentH, 0, 0, nextW, nextH);

				currentCanvas = nextCanvas;
				currentW = nextW;
				currentH = nextH;
			}

			return currentCanvas;
		}

		function redrawEditor() {
			if (!userImgLoaded) {
				drawPlaceholder();
				return;
			}

			const ctx = canvas.getContext('2d');
			ctx.clearRect(0, 0, canvas.width, canvas.height);

			// 1. Draw background cache
			if (bgCache) {
				ctx.drawImage(bgCache, 0, 0, canvas.width, canvas.height);
			} else {
				ctx.fillStyle = '#ffffff';
				ctx.fillRect(0, 0, canvas.width, canvas.height);
			}

			// 2. Draw user image
			ctx.save();
			ctx.translate(canvas.width / 2 + userX, canvas.height / 2 + userY);

			const targetW = userImg.width * userScale;
			const targetH = userImg.height * userScale;
			const smoothImg = getSmoothImage(userImg, Math.abs(targetW), Math.abs(targetH));
			const displayScale = targetW / smoothImg.width;

			ctx.scale(displayScale, displayScale);
			ctx.drawImage(smoothImg, -smoothImg.width / 2, -smoothImg.height / 2);
			ctx.restore();

			// 3. Draw mask cutout overlay
			if (maskOverlayCache) {
				ctx.drawImage(maskOverlayCache, 0, 0);
			}

			// 4. Draw frame cache
			if (frameCache) {
				ctx.drawImage(frameCache, 0, 0, canvas.width, canvas.height);
			}
		}

		/**
		 * Handles initializing and loading the user-selected image.
		 * @param {string} src - The image source data URL or path.
		 */
		function handleImageLoaded(src) {
			const img = new Image();
			img.onload = () => {
				userImg = img;
				userImgLoaded = true;

				// Fit/cover math: start at covering the 300x300 canvas
				const coverScale = Math.max(canvas.width / img.width, canvas.height / img.height);
				defaultScale = coverScale;
				userScale = coverScale;
				userX = 0;
				userY = 0;

				// Adjust zoom slider
				const minVal = Math.min(0.05, coverScale * 0.1);
				const maxVal = Math.max(10.0, coverScale * 10.0);
				$('#zoomSlider')
					.attr('min', minVal)
					.attr('max', maxVal)
					.val(coverScale)
					.attr('step', (maxVal - minVal) / 200)
					.prop('disabled', false);

				$('#editorCanvas').addClass('image-loaded');
				$('#resetBtn').removeClass('disabled');
				$('#generateBtn').removeClass('disabled');

				redrawEditor();
			};
			img.src = src;
		}

		// Drag logic
		/**
		 * Starts dragging/panning movement on the canvas.
		 * @param {number} clientX - The starting client X coordinate.
		 * @param {number} clientY - The starting client Y coordinate.
		 */
		function handleDragStart(clientX, clientY) {
			isDragging = true;
			lastMouseX = clientX;
			lastMouseY = clientY;
		}

		/**
		 * Updates coordinates during active dragging/panning.
		 * @param {number} clientX - The current client X coordinate.
		 * @param {number} clientY - The current client Y coordinate.
		 */
		function handleDragMove(clientX, clientY) {
			if (!isDragging) return;
			const rect = canvas.getBoundingClientRect();
			const scaleX = canvas.width / rect.width;
			const scaleY = canvas.height / rect.height;

			const dx = clientX - lastMouseX;
			const dy = clientY - lastMouseY;

			userX += dx * scaleX;
			userY += dy * scaleY;

			lastMouseX = clientX;
			lastMouseY = clientY;

			redrawEditor();
		}

		function handleDragEnd() {
			isDragging = false;
		}

		// Bind canvas interactions
		canvas.addEventListener('mousedown', (e) => {
			if (!userImgLoaded) {
				$('#imageInput').trigger('click');
				return;
			}
			handleDragStart(e.clientX, e.clientY);
			e.preventDefault();
		});

		window.addEventListener('mousemove', (e) => {
			if (isDragging) {
				handleDragMove(e.clientX, e.clientY);
				e.preventDefault();
			}
		});

		window.addEventListener('mouseup', () => {
			handleDragEnd();
		});

		canvas.addEventListener('touchstart', (e) => {
			if (!userImgLoaded) return;
			if (e.touches.length === 1) {
				handleDragStart(e.touches[0].clientX, e.touches[0].clientY);
				e.preventDefault();
			}
		}, { passive: false });

		window.addEventListener('touchmove', (e) => {
			if (isDragging && e.touches.length === 1) {
				handleDragMove(e.touches[0].clientX, e.touches[0].clientY);
				e.preventDefault();
			}
		}, { passive: false });

		window.addEventListener('touchend', () => {
			handleDragEnd();
		});

		// Mouse wheel zooming
		canvas.addEventListener('wheel', (e) => {
			if (!userImgLoaded) return;
			e.preventDefault();

			const factor = e.deltaY < 0 ? 1.05 : 0.95;
			const newScale = userScale * factor;

			const minVal = parseFloat($('#zoomSlider').attr('min'));
			const maxVal = parseFloat($('#zoomSlider').attr('max'));

			userScale = Math.max(minVal, Math.min(maxVal, newScale));
			$('#zoomSlider').val(userScale);

			redrawEditor();
		}, { passive: false });

		// Zoom Slider
		$('#zoomSlider').on('input', function () {
			userScale = parseFloat($(this).val());
			redrawEditor();
		});

		// Reset Button
		$('#resetBtn').on('click', () => {
			if (!userImgLoaded) return;
			userScale = defaultScale;
			userX = 0;
			userY = 0;
			$('#zoomSlider').val(userScale);
			redrawEditor();
		});

		// File Select / Upload Triggers
		$('#uploadBtn').on('click', () => {
			$('#imageInput').trigger('click');
		});

		$('#imageInput').on('change', function (e) {
			if (this.files && this.files[0]) {
				const file = this.files[0];
				const reader = new FileReader();
				reader.onload = (evt) => {
					handleImageLoaded(evt.target.result);
				};
				reader.readAsDataURL(file);
			}
		});

		// Drag & Drop File Loader
		canvas.addEventListener('dragover', (e) => {
			e.preventDefault();
			canvas.style.borderColor = '#21ba45'; // green border
		});

		canvas.addEventListener('dragleave', (e) => {
			e.preventDefault();
			canvas.style.borderColor = userImgLoaded ? '#2185d0' : '#a333c8';
		});

		canvas.addEventListener('drop', (e) => {
			e.preventDefault();
			canvas.style.borderColor = userImgLoaded ? '#2185d0' : '#a333c8';

			if (e.dataTransfer.files && e.dataTransfer.files[0]) {
				const file = e.dataTransfer.files[0];
				if (file.type.match('image.*')) {
					const reader = new FileReader();
					reader.onload = (evt) => {
						handleImageLoaded(evt.target.result);
					};
					reader.readAsDataURL(file);
				}
			}
		});

		// Frame Selection Settings
		$('input[name="frameSelect"]').on('change', () => {
			updateFrameCache();
			redrawEditor();
		});

		$('#frameColor').on('input change', function () {
			const hex = $(this).val();
			$('#frameHexLabel').text(hex);
			updateFrameCache();
			redrawEditor();

			$('.frame-chip').removeClass('active');
			$(`.frame-chip[data-color="${hex.toLowerCase()}"]`).addClass('active');
		});

		// Background Selection Settings
		$('input[name="bgSelect"]').on('change', function () {
			const bgVal = $(this).val();
			if (bgVal === 'none') {
				$('#bgColorContainer').addClass('disabled');
			} else {
				$('#bgColorContainer').removeClass('disabled');
			}
			updateBgCache();
			redrawEditor();
		});

		$('#bgColor').on('input change', function () {
			const hex = $(this).val();
			$('#bgHexLabel').text(hex);
			updateBgCache();
			redrawEditor();

			$('.bg-chip').removeClass('active');
			$(`.bg-chip[data-color="${hex.toLowerCase()}"]`).addClass('active');
		});

		// GENERATION LOGIC: Outputting the 128x128 composited PNG
		$('#generateBtn').on('click', () => {
			if (!userImgLoaded) return;

			// Add UI loading feedback
			$('#generateBtn').addClass('loading');

			setTimeout(() => {
				try {
					// 1. Create a 128x128 canvas
					const outCanvas = document.createElement('canvas');
					outCanvas.width = 128;
					outCanvas.height = 128;
					const outCtx = outCanvas.getContext('2d');

					// 2. Perform Optional Background Composite (1st layer)
					const bgVal = $('input[name="bgSelect"]:checked').val();
					if (bgVal === 'smile' && images['bg_smile']) {
						const tintedBgCanvas = tintImage(images['bg_smile'], $('#bgColor').val());
						outCtx.drawImage(tintedBgCanvas, 0, 0, 128, 128);
					}

					// 3. User Image Cropping and Scaling onto temporary 128x128 canvas
					const userCanvas = document.createElement('canvas');
					userCanvas.width = 128;
					userCanvas.height = 128;
					const uCtx = userCanvas.getContext('2d');

					// Map viewport (300x300) to output (128x128)
					const F = 128.0 / canvas.width;

					const targetW = userImg.width * userScale * F;
					const targetH = userImg.height * userScale * F;
					const smoothImg = getSmoothImage(userImg, Math.abs(targetW), Math.abs(targetH));
					const drawScale = targetW / smoothImg.width;

					uCtx.save();
					uCtx.translate(64 + userX * F, 64 + userY * F);
					uCtx.scale(drawScale, drawScale);
					uCtx.drawImage(smoothImg, -smoothImg.width / 2, -smoothImg.height / 2);
					uCtx.restore();

					// 4. Perform Masking using liveicontemp/mask.png
					if (images['mask']) {
						// Load mask onto a 128x128 temp canvas to process transparency
						const tempMaskCanvas = document.createElement('canvas');
						tempMaskCanvas.width = 128;
						tempMaskCanvas.height = 128;
						const tmCtx = tempMaskCanvas.getContext('2d');
						tmCtx.drawImage(images['mask'], 0, 0, 128, 128);

						const maskData = tmCtx.getImageData(0, 0, 128, 128);
						const userData = uCtx.getImageData(0, 0, 128, 128);

						const m = maskData.data;
						const u = userData.data;

						for (let i = 0; i < u.length; i += 4) {
							// Red channel of grayscale mask is intensity
							const intensity = m[i] / 255.0;
							// Multiply user alpha by mask intensity and mask alpha
							const maskAlpha = m[i + 3] / 255.0;
							u[i + 3] = Math.round(u[i + 3] * intensity * maskAlpha);
						}

						uCtx.putImageData(userData, 0, 0);
					}

					// Draw masked image (2nd layer)
					outCtx.drawImage(userCanvas, 0, 0);

					// 5. Draw Frame (3rd layer)
					const frameVal = $('input[name="frameSelect"]:checked').val();
					let frameImg = null;
					if (frameVal === 'sr') frameImg = images['frame_sr'];
					else if (frameVal === 'ur_old') frameImg = images['frame_ur_old'];
					else if (frameVal === 'ur_empty') frameImg = images['frame_ur_empty'];

					if (frameImg) {
						const tintedFrameCanvas = tintImage(frameImg, $('#frameColor').val());
						outCtx.drawImage(tintedFrameCanvas, 0, 0, 128, 128);
					}

					// 6. Generate Data URL and export to UI
					const dataURL = outCanvas.toDataURL('image/png');

					$('#resultPreview').attr('src', dataURL);
					$('#downloadLink').attr('href', dataURL);
					$('#resultSegment').show();

					// Scroll to result on small screens
					document.getElementById('resultSegment').scrollIntoView({ behavior: 'smooth' });

				} catch (err) {
					console.error('Error generating icon: ', err);
					alert('An error occurred while generating the icon. Please check console.');
				} finally {
					$('#generateBtn').removeClass('loading');
				}
			}, 300);
		});

		// Initialize
		$(document).ready(() => {
			preloadAssets();
		});
	</script>
</body>

</html>
